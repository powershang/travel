<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="旅行計畫">
<meta name="theme-color" content="#F5F0E1">
<title>旅行計畫</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjZTkxZTYzIi8+PHRleHQgeD0iOTAiIHk9IjEwNSIgZm9udC1zaXplPSI4MCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0id2hpdGUiPuS9kOizgDwvdGV4dD48dGV4dCB4PSI5MCIgeT0iMTQ1IiBmb250LXNpemU9IjMwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjZmZjY2JjIj7ml4XooYwgMjAyNjwvdGV4dD48L3N2Zz4=">
<style>
:root {
  --pink: #C67B5C;
  --pink-light: #FBF3EE;
  --pink-dark: #9A5A3E;
  --bg: #F5F0E1;
  --card: #FEFCF8;
  --text: #3D3229;
  --text2: #8C7E72;
  --accent: #6B7B3C;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --tab-h: 56px;
  --border: #E5DDD2;
  --ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-ambient: 0 2px 20px rgba(61,50,41,.06);
  --shadow-card-hover: 0 8px 30px rgba(61,50,41,.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;height:100dvh;position:fixed;width:100%;letter-spacing:-0.01em;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.header{background:var(--card);color:var(--text);padding:calc(var(--safe-top)+14px) 16px 8px;display:flex;align-items:center;justify-content:space-between;z-index:100;position:relative;border-bottom:1px solid var(--border)}
@media all and (display-mode:standalone){.header{padding-top:calc(env(safe-area-inset-top,28px) + 14px)}}
.header h1{font-size:19px;font-weight:800;letter-spacing:-0.04em;color:var(--text)}
.header .subtitle{font-size:11px;opacity:1;color:var(--text2);font-weight:500;letter-spacing:0.01em}
.header-btns{display:flex;gap:5px;align-items:center}
.header-btn{background:var(--bg);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .4s var(--ease-spring)}
.header-btn:hover{background:var(--pink-light);border-color:rgba(198,123,92,.3);box-shadow:0 2px 8px rgba(198,123,92,.1)}
.header-btn:active{transform:scale(.94);transition-duration:.1s}
.header-btn.edit-active{background:var(--pink);color:#fff;border-color:var(--pink)}
.day-chips{display:flex;gap:6px;overflow-x:auto;padding:8px 16px 10px;background:var(--card);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch}
.day-chip{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;background:transparent;color:var(--text2);border:1px solid var(--border);cursor:pointer;white-space:nowrap;transition:all .5s var(--ease-spring)}
.day-chip:hover{background:var(--pink-light);border-color:rgba(198,123,92,.3);color:var(--text)}
.day-chip:active{transform:scale(.96);transition-duration:.1s}
.day-chip.active{background:var(--pink);color:#fff;border-color:var(--pink);font-weight:600;box-shadow:0 2px 12px rgba(198,123,92,.25)}

.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h)+var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--card);display:flex;border-top:1px solid var(--border);z-index:100}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:10px;color:var(--text2);border:none;background:none;cursor:pointer;padding:4px 0;transition:all .4s var(--ease-spring);font-weight:500}
.tab-item:active{transform:scale(.92);transition-duration:.1s}
.tab-item.active{color:var(--pink-dark);font-weight:600}
.tab-item .icon{font-size:22px}

.content{position:fixed;top:0;left:0;right:0;height:calc(100dvh - var(--tab-h) - var(--safe-bottom));overflow:hidden}
.page{display:none;height:100%}
.page.active{display:flex;flex-direction:column;overflow:hidden}
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 24px;min-height:0}

#itinerary-page .itin-body{flex:1;display:flex;flex-direction:row;overflow:hidden}
#cards-panel{width:45%;min-width:180px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 24px;border-right:1px solid var(--border);background:var(--bg)}
#map-panel{flex:1;position:relative}
#map-container{width:100%;height:100%}

#food-page .food-body{flex:1;display:flex;flex-direction:row;overflow:hidden}
#food-cards-panel{width:45%;min-width:180px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 24px;border-right:1px solid var(--border);background:var(--bg)}
#food-map-panel{flex:1;position:relative}
#food-map-container{width:100%;height:100%}

@media(max-width:540px) and (orientation:portrait){
  #itinerary-page .itin-body{flex-direction:column}
  #cards-panel{width:100%;order:2;flex:1;border-right:none;border-top:1px solid var(--border)}
  #map-panel{order:1;height:35vh;flex:none}
  #food-page .food-body{flex-direction:column}
  #food-cards-panel{width:100%;order:2;flex:1;border-right:none;border-top:1px solid var(--border)}
  #food-map-panel{order:1;height:35vh;flex:none}
}

.now-indicator{background:#f0f2ee;border-left:3px solid var(--pink);padding:8px 12px;margin-bottom:10px;border-radius:6px;font-size:12px;font-weight:500;color:var(--pink-dark)}
.countdown-bar{background:#F5EDE4;border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:10px}

.card{background:var(--card);border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;transition:all .5s var(--ease-spring);box-shadow:var(--shadow-ambient)}
.card:hover{box-shadow:var(--shadow-card-hover);border-color:rgba(198,123,92,.25);transform:translateY(-1px)}
.card:active{transform:scale(.99);transition-duration:.15s}
.card.now{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink),var(--shadow-ambient)}
.card.highlight{border-color:#7a9ec2;box-shadow:0 0 0 1px #7a9ec2,var(--shadow-ambient)}
.card.dragging{opacity:.3;transform:scale(.95);border:2px dashed var(--pink);transition:all .2s}
.card-main{display:flex;align-items:center;padding:12px;gap:10px;cursor:pointer}
.card-time{font-size:12px;font-weight:600;color:var(--pink-dark);min-width:40px;text-align:center;font-variant-numeric:tabular-nums}
.card-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.card-icon.spot{background:#EDE8DA}.card-icon.restaurant{background:#F5EDE4}.card-icon.hotel{background:#F2ECE6}.card-icon.transport{background:#E8E4DB}.card-icon.snack{background:#F3EEE0}.card-icon.airport{background:#EDEAE3}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em}
.card-sub{font-size:11px;color:var(--text2);margin-top:2px}
.card-drag-handle{cursor:grab;color:#ccc;font-size:16px;flex-shrink:0;padding:0 2px;user-select:none;touch-action:none}
.card-drag-handle:active{cursor:grabbing;color:#999}
.card.drag-over{border-top:3px solid var(--pink);box-shadow:0 -4px 16px rgba(198,123,92,.2);position:relative}
.card.drag-over::before{content:'▼ 放在這裡';position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:var(--pink);color:#fff;font-size:10px;font-weight:600;padding:2px 10px;border-radius:10px;white-space:nowrap;z-index:10;animation:dropHintPulse 1s ease infinite}
@keyframes dropHintPulse{0%,100%{opacity:1;transform:translateX(-50%) translateY(0)}50%{opacity:.7;transform:translateX(-50%) translateY(-2px)}}
.card-arrow{color:#ccc;font-size:14px;flex-shrink:0}
.card-detail{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.card-detail.open{display:block}
.card-actions{display:flex;gap:6px;padding-top:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:500;border:1px solid var(--border);cursor:pointer;text-decoration:none;white-space:nowrap;background:var(--card);color:var(--text);transition:all .4s var(--ease-spring)}
.btn:hover{box-shadow:0 2px 8px rgba(61,50,41,.08);transform:translateY(-1px);border-color:rgba(198,123,92,.3)}
.btn-nav{background:#F0ECE4;color:#6B5A42;border-color:#DDD4C5}.btn-call{background:#EDE8DA;color:#5C6B32;border-color:#D8D0BE}.btn-link{background:#F5EDE4;color:#9A5A3E;border-color:#E5D5C5}
.btn-del{background:#faf2f2;color:#9a4a4a;border-color:#eedcdc}.btn-edit{background:#f2f2f6;color:#4a4a6a;border-color:#dcdce8}
.btn:active{transform:scale(.97);transition-duration:.1s}
.drive-info{display:flex;align-items:center;gap:4px;padding:2px 12px 2px 62px;font-size:10px;color:var(--text2)}
.drive-info::before{content:'';width:1px;height:10px;background:#ddd}
.section-title{font-size:11px;font-weight:600;color:var(--text2);padding:8px 0 4px;text-transform:uppercase;letter-spacing:0.05em}

/* Edit mode card extras */
.edit-bar{display:none;align-items:center;gap:4px;padding:4px 12px;background:var(--bg);border-top:1px solid var(--border)}
.edit-mode .edit-bar{display:flex}
.edit-bar .drag-handle{cursor:grab;font-size:16px;color:#999;margin-right:auto}
.add-item-btn{display:none;width:100%;padding:12px;border:1.5px dashed #d0cec9;border-radius:8px;background:none;font-size:13px;color:var(--text2);cursor:pointer;margin:8px 0}
.edit-mode .add-item-btn{display:block}
.add-item-btn:active{background:#f0efed}

/* Modal / Panel overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;justify-content:center;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-panel{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px 20px calc(var(--safe-bottom) + 20px);animation:slideUp .5s var(--ease-out-expo);box-shadow:0 -4px 40px rgba(61,50,41,.12)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-header h2{font-size:17px;font-weight:700;letter-spacing:-0.02em}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text2);width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:active{background:var(--bg)}

/* Plan list */
.plan-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;margin-bottom:6px;cursor:pointer;border:1.5px solid var(--border);transition:all .4s var(--ease-spring);box-shadow:var(--shadow-ambient)}
.plan-item:hover{box-shadow:var(--shadow-card-hover);transform:translateY(-1px)}
.plan-item:active{transform:scale(.98);transition-duration:.1s}
.plan-item.active-plan{border-color:var(--pink);background:var(--pink-light);box-shadow:0 2px 16px rgba(198,123,92,.15)}
.plan-radio{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.plan-item.active-plan .plan-radio{border-color:var(--pink);background:var(--pink)}
.plan-item.active-plan .plan-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.plan-name{flex:1;font-size:14px;font-weight:500}
.plan-actions{display:flex;gap:2px}
.plan-actions button{background:none;border:none;font-size:16px;cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center}
.plan-actions button:active{background:var(--bg)}
.plan-item.archived-plan{opacity:.5;border-color:#ddd;background:#faf9f7;cursor:default}
.plan-item.archived-plan .plan-radio{border-color:#ccc;background:#eee}
.plan-item.archived-plan .plan-name::after{content:'已封存';font-size:10px;color:#999;background:#eee;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.plan-create-btns{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.plan-create-btns button{padding:12px;border-radius:8px;border:1.5px dashed #d0cec9;background:#fff;font-size:13px;cursor:pointer}
.plan-create-btns button:active{background:var(--bg)}

/* Multi-day Kanban */
.multi-day-container{display:flex;gap:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px;min-height:60vh}
.multi-day-column{flex:0 0 280px;background:var(--bg);border-radius:14px;border:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 200px);overflow:hidden}
.multi-day-column.dragover{border-color:var(--pink);box-shadow:0 0 0 2px var(--pink-light)}
.multi-day-header{padding:10px 12px;font-weight:700;font-size:13px;border-bottom:1px solid var(--border);background:var(--card);border-radius:14px 14px 0 0;position:sticky;top:0;z-index:1}
.multi-day-cards{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;min-height:60px}
.multi-day-cards .card{margin-bottom:0;font-size:12px}
.day-chip.multi-selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.day-chip.multi-btn{background:transparent;border-style:dashed;color:var(--text2)}
.day-chip.multi-btn.multi-active{background:var(--accent);color:#fff;border-style:solid;border-color:var(--accent)}
@media(max-width:768px){
  .multi-day-container{flex-direction:column;overflow-x:hidden}
  .multi-day-column{flex:0 0 auto;max-height:none}
}

/* Spot Library */
.spot-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid var(--border);box-shadow:var(--shadow-ambient);cursor:grab;transition:all .4s var(--ease-spring);position:relative}
.spot-card:active{cursor:grabbing}
.spot-card:hover{box-shadow:var(--shadow-card-hover);transform:translateY(-1px)}
.spot-card.dragging{opacity:.4;transform:scale(.97)}
.spot-card.in-itinerary{border-left:3px solid var(--accent);background:linear-gradient(135deg,var(--card) 0%,rgba(107,123,60,.04) 100%)}
.spot-card .spot-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.spot-card .spot-meta{font-size:12px;color:var(--text2);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.spot-card .spot-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.spot-badge.placed{background:rgba(107,123,60,.12);color:var(--accent);border:1px solid rgba(107,123,60,.2)}
.spot-badge.unplaced{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.spot-card .spot-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.spot-lib-drop-zone{border:2px dashed var(--border);border-radius:14px;padding:32px;text-align:center;color:var(--text2);font-size:13px;margin:8px 0;transition:all .3s}
.spot-lib-drop-zone.dragover{border-color:var(--pink);background:var(--pink-light);color:var(--pink)}

/* Edit item panel */
.edit-panel{display:none;position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.4);justify-content:flex-end}
.edit-panel.open{display:flex}
.edit-panel-inner{background:#fff;width:100%;max-width:400px;height:100%;overflow-y:auto;padding:24px 20px;animation:slideRight .25s ease}
@keyframes slideRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.edit-field{margin-bottom:16px}
.edit-field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em}
.edit-field input,.edit-field textarea,.edit-field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;background:#fff}
.edit-field textarea{height:80px;resize:vertical}
.edit-field input:focus,.edit-field textarea:focus,.edit-field select:focus{outline:none;border-color:var(--pink)}
.edit-field .coord-display{font-size:12px;color:var(--text2);padding:8px;background:var(--bg);border-radius:6px}

/* Places search */
.places-results{list-style:none;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;max-height:200px;overflow-y:auto;display:none}
.places-results.show{display:block}
.places-results li{padding:10px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.places-results li:active,.places-results li:hover{background:var(--bg)}

/* Toast */
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 16px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:300;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.15);animation:fadeIn .2s}
.toast button{background:var(--pink);color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* AI Review Modal */
.ai-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;justify-content:center;align-items:center;padding:16px}
.ai-modal-overlay.open{display:flex}
.ai-modal{background:#fff;border-radius:12px;width:100%;max-width:600px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .25s ease}
.ai-modal-head{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border)}
.ai-modal-head h2{font-size:17px;font-weight:700;margin:0;letter-spacing:-0.02em}
.ai-modal-body{flex:1;overflow-y:auto;padding:20px;font-size:14px;line-height:1.7}
.ai-modal-body h1,.ai-modal-body h2,.ai-modal-body h3{margin:16px 0 8px;color:var(--text)}
.ai-modal-body h1{font-size:18px;font-weight:700}.ai-modal-body h2{font-size:16px;font-weight:600}.ai-modal-body h3{font-size:14px;font-weight:600}
.ai-modal-body ul,.ai-modal-body ol{padding-left:20px;margin:8px 0}
.ai-modal-body li{margin:4px 0}
.ai-modal-body strong{color:var(--text)}
.ai-modal-body p{margin:8px 0}
.ai-spinner{text-align:center;padding:60px 20px;color:var(--text2)}
.ai-spinner .spin{display:inline-block;width:36px;height:36px;border:3px solid #eee;border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Import Modal */
.import-modal textarea{width:100%;height:200px;border:1.5px solid var(--border);border-radius:6px;padding:10px;font-size:13px;font-family:monospace;resize:vertical}
.import-modal textarea:focus{outline:none;border-color:var(--pink)}
.import-modal .import-actions{display:flex;gap:8px;margin-top:12px}
.import-modal .import-actions button{flex:1;padding:12px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer}
.import-modal .btn-import{background:var(--pink);color:#fff}
.import-modal .btn-import:active{background:var(--pink-dark)}
.import-modal .btn-cancel{background:var(--bg);color:var(--text);border:1px solid var(--border)}

/* Map search overlay */
.map-search{position:absolute;top:10px;left:10px;right:10px;z-index:500}
.map-search input{width:100%;padding:10px 40px 10px 36px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.06);font-family:inherit}
.map-search input:focus{outline:none;border-color:var(--pink);box-shadow:0 1px 4px rgba(0,0,0,.1)}

const _SAGA_DATES=['2026-02-26','2026-02-27','2026-02-28','2026-03-01','2026-03-02','2026-03-03'];
const DAY_LABELS=['Day1 佐賀市','Day2 唐津','Day3 伊万里→嬉野','Day4 豪斯登堡','Day5 鹿島・太良','Day6 回程'];
const DAY_SHORT=['D1','D2','D3','D4','D5','D6'];
const DAY_REGIONS=['佐賀市・神崎','唐津市・呼子','伊万里→武雄→嬉野','嬉野→豪斯登堡','武雄→鹿島→太良','鹿島→佐賀機場'];
// 動態取得當前行程的日期列表（sorted），若尚未載入則回傳佐賀預設
function getTripDates(){
  try{
    const itin=getActiveItinerary();
    const keys=Object.keys(itin).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
    return keys.length?keys:_SAGA_DATES;
  }catch(e){return _SAGA_DATES;}
}
// 相容舊程式碼：TRIP_DATES 改為 getter proxy（讀取時動態計算）
const TRIP_DATES=new Proxy([],{get:(t,p)=>{const d=getTripDates();if(p==='length')return d.length;if(p==='forEach')return d.forEach.bind(d);if(p==='map')return d.map.bind(d);if(p==='indexOf')return d.indexOf.bind(d);if(typeof p==='string'&&!isNaN(p))return d[+p];return d[p];}});
// 標籤 helper：只有佐賀行程才用靜態 label，其他行程用通用 Day N 格式
function getDayShort(i){const d=getTripDates();return _SAGA_DATES.includes(d[i])?DAY_SHORT[i]:`D${i+1}`;}
function getDayLabel(i){const d=getTripDates();return _SAGA_DATES.includes(d[i])?DAY_LABELS[i]:`Day${i+1}`;}
function getDayRegion(i){const d=getTripDates();return _SAGA_DATES.includes(d[i])?DAY_REGIONS[i]:(d[i]||'');}

function genId(){return Math.random().toString(36).substr(2,8)}
// === 方案資料（純記憶體 + DB，不用 localStorage）===
let _plansCache=null;
const FOODS_DEFAULT=JSON.parse(JSON.stringify(foods));
const RESERVATIONS_DEFAULT=JSON.parse(JSON.stringify(reservations));
function defaultPlanData(){return {itinerary:JSON.parse(JSON.stringify(ITINERARY_DEFAULT)),foods:JSON.parse(JSON.stringify(FOODS_DEFAULT)),reservations:JSON.parse(JSON.stringify(RESERVATIONS_DEFAULT)),resStatusMap:{},resOrder:[],spots:[],notes:''}}
function defaultPlans(){return {plans:[{id:'default',name:'佐賀原始版',data:defaultPlanData(),createdAt:new Date().toISOString()}],activeId:'default'}}
function migratePlanData(plan){
  // Migrate old format: plan.data was itinerary directly (has date keys like "2026-02-26")
  if(plan.data && !plan.data.itinerary){
    plan.data={itinerary:plan.data,foods:JSON.parse(JSON.stringify(FOODS_DEFAULT)),reservations:JSON.parse(JSON.stringify(RESERVATIONS_DEFAULT)),resStatusMap:{},resOrder:[]};
  }
  if(!plan.data.foods) plan.data.foods=JSON.parse(JSON.stringify(FOODS_DEFAULT));
  if(!plan.data.reservations) plan.data.reservations=JSON.parse(JSON.stringify(RESERVATIONS_DEFAULT));
  if(!plan.data.resStatusMap) plan.data.resStatusMap={};
  if(!plan.data.resOrder) plan.data.resOrder=[];
  if(!plan.data.spots) plan.data.spots=[];
  if(plan.data.notes===undefined) plan.data.notes='';
  return plan;
}
function loadPlans(){
  if(!_plansCache) _plansCache=defaultPlans();
  _plansCache.plans.forEach(migratePlanData);
  return _plansCache;
}
function savePlansData(plans){
  _plansCache=plans;
  fetch('/api/data/trip_plans',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(plans)}).catch(()=>{});
}
function savePlans(){savePlansData(loadPlans())}
function getActivePlan(){
  const plans=loadPlans();
  return plans.plans.find(p=>p.id===plans.activeId)||plans.plans[0];
}
function getActiveItinerary(){return getActivePlan().data.itinerary}
function updateActiveItinerary(data){
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===plans.activeId);
  if(p) p.data.itinerary=data;
  savePlansData(plans);
}
function switchPlan(id){
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===id);
  if(p&&p.archived) return;
  // Save current state back before switching
  saveActivePlanState();
  plans.activeId=id;
  // Load new plan state
  loadActivePlanState();
  savePlansData(plans);
  renderItinerary(); renderMap(); renderFoodPage(); renderReservations(); renderSpotLibrary(); renderPlanList();
}
function saveActivePlanState(){
  const p=getActivePlan();
  if(!p) return;
  p.data.resStatusMap=resStatusMap;
  p.data.resOrder=resOrder;
  // spots/notes are saved immediately when changed, no need to save here
}
function loadActivePlanState(){
  const p=getActivePlan();
  if(!p) return;
  foods=p.data.foods;
  reservations=p.data.reservations;
  resStatusMap=p.data.resStatusMap||{};
  resOrder=p.data.resOrder&&p.data.resOrder.length===reservations.length?p.data.resOrder:reservations.map((_,i)=>i);
}
function duplicatePlan(id){
  const plans=loadPlans();
  const src=plans.plans.find(p=>p.id===id);
  if(!src) return;
  const name=prompt('新方案名稱：',src.name+' 副本');
  if(!name) return;
  // Save current state if duplicating the active plan
  if(id===plans.activeId) saveActivePlanState();
  plans.plans.push({id:genId(),name,data:JSON.parse(JSON.stringify(src.data)),createdAt:new Date().toISOString()});
  savePlansData(plans);
  renderPlanList();
}
function deletePlan(id){
  const plans=loadPlans();
  if(plans.plans.length<=1){alert('至少保留一套方案');return}
  if(plans.activeId===id){alert('不能刪除目前使用中的方案');return}
  const p=plans.plans.find(p=>p.id===id);
  if(!confirm('確定刪除「'+(p?p.name:'')+'」？')) return;
  plans.plans=plans.plans.filter(p=>p.id!==id);
  savePlansData(plans);
  renderPlanList();
}
function renamePlan(id){
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===id);
  if(!p||p.archived) return;
  const name=prompt('重新命名：',p.name);
  if(!name) return;
  p.name=name;
  savePlansData(plans);
  renderPlanList();
}
function archivePlan(id){
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===id);
  if(!p) return;
  if(plans.activeId===id){alert('不能封存目前使用中的方案');return}
  if(!confirm('封存「'+p.name+'」？封存後不可編輯。')) return;
  p.archived=true;
  savePlansData(plans);
  renderPlanList();
}
function unarchivePlan(id){
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===id);
  if(!p) return;
  p.archived=false;
  savePlansData(plans);
  renderPlanList();
}
function createEmptyPlan(){
  const name=prompt('新方案名稱：','新方案');
  if(!name) return;
  const plans=loadPlans();
  const emptyItinerary={};
  TRIP_DATES.forEach(d=>emptyItinerary[d]=[]);

function createFromDefault(){

function openPlanModal(){

function renderPlanList(){
  const plans=loadPlans();
  const el=document.getElementById('planList');
  const active_plans=plans.plans.filter(p=>!p.archived);
  const archived_plans=plans.plans.filter(p=>p.archived);
  let html=active_plans.map(p=>{
    const active=p.id===plans.activeId;
    const itin=p.data&&p.data.itinerary?p.data.itinerary:{};
    const days=Object.values(itin).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);
    const dates=Object.keys(itin).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
    const dateRange=dates.length>=2?`${dates[0].slice(5)} ~ ${dates[dates.length-1].slice(5)}`:(dates[0]||'');
    return `<div class="plan-item${active?' active-plan':''}" onclick="switchPlan('${p.id}')">
      <div class="plan-radio"></div>
      <div class="plan-name">${p.name}<div style="font-size:11px;color:var(--text2)">${dateRange} ・ ${days} 個項目</div></div>
      <div class="plan-actions" onclick="event.stopPropagation()">
        <button onclick="renamePlan('${p.id}')" title="重新命名">✏️</button>
        <button onclick="duplicatePlan('${p.id}')" title="複製方案">📋</button>
        <button onclick="archivePlan('${p.id}')" title="封存">📦</button>
        <button onclick="deletePlan('${p.id}')" title="刪除">🗑</button>
      </div>
    </div>`;
  }).join('');
  if(archived_plans.length){
    html+=`<div style="margin:12px 0 6px;font-size:12px;color:#999;border-top:1px solid #eee;padding-top:10px">📦 已封存</div>`;
    html+=archived_plans.map(p=>{
      const itin2=p.data&&p.data.itinerary?p.data.itinerary:{};
      const days=Object.values(itin2).reduce((s,a)=>s+(Array.isArray(a)?a.length:0),0);
      const dates2=Object.keys(itin2).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
      const dateRange2=dates2.length>=2?`${dates2[0].slice(5)} ~ ${dates2[dates2.length-1].slice(5)}`:(dates2[0]||'');
      return `<div class="plan-item archived-plan">
        <div class="plan-radio"></div>
        <div class="plan-name">${p.name}<div style="font-size:11px;color:var(--text2)">${dateRange2} ・ ${days} 個項目</div></div>
        <div class="plan-actions" onclick="event.stopPropagation()">
          <button onclick="unarchivePlan('${p.id}')" title="解除封存">📤</button>
          <button onclick="duplicatePlan('${p.id}')" title="複製方案">📋</button>
          <button onclick="deletePlan('${p.id}')" title="刪除">🗑</button>
        </div>
      </div>`;
    }).join('');
  }
  el.innerHTML=html;
}

function saveEditItem(){

// === DELETE + UNDO ===
function deleteItem(idx){
  const itin=getActiveItinerary();
  const date=TRIP_DATES[currentDay];
  const items=itin[date]||[];
  if(idx<0||idx>=items.length) return;
  const removed=items.splice(idx,1)[0];
  updateActiveItinerary(itin);
  renderItinerary(); renderMap();
  showUndoToast(removed,idx,date);
}
function showUndoToast(item,idx,date){
  if(undoTimeout) clearTimeout(undoTimeout);
  const existing=document.querySelector('.toast');
  if(existing) existing.remove();
  undoItem={item,idx,date};
  const toast=document.createElement('div');
  toast.className='toast';
  toast.innerHTML=`已刪除「${item.name}」<button onclick="undoDelete()">復原</button>`;
  document.body.appendChild(toast);
  undoTimeout=setTimeout(()=>{toast.remove();undoItem=null},4000);
}
function undoDelete(){
  if(!undoItem) return;
  const itin=getActiveItinerary();
  if(!itin[undoItem.date]) itin[undoItem.date]=[];
  itin[undoItem.date].splice(undoItem.idx,0,undoItem.item);
  updateActiveItinerary(itin);
  renderItinerary(); renderMap();
  const toast=document.querySelector('.toast');
  if(toast) toast.remove();
  if(undoTimeout) clearTimeout(undoTimeout);
  undoItem=null;
}

// === DRAG & DROP ===
function onDragStart(e,idx){
  dragSrcIdx=idx;
  e.dataTransfer.effectAllowed='move';
  e.target.closest('.card').classList.add('dragging');
}
function onDragOver(e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  const card=e.target.closest('.card');
  document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'));
  if(card) card.classList.add('drag-over');
}
function onDrop(e,idx){
  e.preventDefault();
  document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'));
  if(dragSrcIdx===null||dragSrcIdx===idx) return;
  reorderItem(dragSrcIdx,idx);
  dragSrcIdx=null;
}
function onDragEnd(e){
  dragSrcIdx=null;
  document.querySelectorAll('.card.dragging,.card.drag-over').forEach(c=>{c.classList.remove('dragging');c.classList.remove('drag-over')});
}
function reorderItem(fromIdx,toIdx){
  const itin=getActiveItinerary();
  const date=TRIP_DATES[currentDay];
  const items=itin[date]||[];
  if(fromIdx<0||fromIdx>=items.length||toIdx<0||toIdx>=items.length) return;
  const [moved]=items.splice(fromIdx,1);
  items.splice(toIdx,0,moved);
  updateActiveItinerary(itin);
  renderItinerary(); renderMap();
}

// === TOUCH DRAG (mobile) — long-press anywhere on card ===
let touchDragIdx=null, touchClone=null, touchStartY=0, touchStartX=0;
let longPressTimer=null, isLongPress=false;
function onCardTouchStart(e,idx){
  if(!editMode) return; // only in edit mode
  const t=e.touches[0];
  touchStartX=t.clientX; touchStartY=t.clientY;
  isLongPress=false;
  longPressTimer=setTimeout(()=>{
    isLongPress=true;
    navigator.vibrate&&navigator.vibrate(30);
    touchDragIdx=idx;
    const card=e.target.closest('.card');
    touchClone=card.cloneNode(true);
    touchClone.style.cssText='position:fixed;left:8px;right:8px;z-index:999;opacity:.9;pointer-events:none;box-shadow:0 8px 32px rgba(61,50,41,.25);border:2px solid var(--pink);border-radius:14px;transition:none;transform:scale(1.02)';
    touchClone.style.top=card.getBoundingClientRect().top+'px';
    document.body.appendChild(touchClone);
    card.classList.add('dragging');
    document.addEventListener('touchmove',onTouchDragMove,{passive:false});
    document.addEventListener('touchend',onTouchDragEnd);
  },300);
}
function onCardTouchMove(e){
  // Cancel long press if finger moved too much
  if(longPressTimer&&!isLongPress){
    const t=e.touches[0];
    if(Math.abs(t.clientX-touchStartX)>8||Math.abs(t.clientY-touchStartY)>8){
      clearTimeout(longPressTimer);longPressTimer=null;
    }
  }
}
function onCardTouchEnd(){
  if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null}
}
function onTouchDragMove(e){
  e.preventDefault();
  if(touchClone){
    const dy=e.touches[0].clientY-touchStartY;
    const origCard=document.getElementById('card-'+touchDragIdx);
    if(origCard) touchClone.style.top=(origCard.getBoundingClientRect().top+dy)+'px';
  }
  document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'));
  const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  if(el){const card=el.closest('.card');if(card&&card!==document.getElementById('card-'+touchDragIdx)) card.classList.add('drag-over')}
}
function onTouchDragEnd(e){
  document.removeEventListener('touchmove',onTouchDragMove);
  document.removeEventListener('touchend',onTouchDragEnd);
  if(touchClone){touchClone.remove();touchClone=null}
  document.querySelectorAll('.card.dragging,.card.drag-over').forEach(c=>{c.classList.remove('dragging');c.classList.remove('drag-over')});
  const touch=e.changedTouches[0];
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  if(el){
    const card=el.closest('.card');
    if(card&&card.id.startsWith('card-')){
      const toIdx=parseInt(card.id.split('-')[1]);
      if(touchDragIdx!==null&&touchDragIdx!==toIdx) reorderItem(touchDragIdx,toIdx);
    }
  }
  touchDragIdx=null;isLongPress=false;
}
// Legacy handle-based touch drag (keep for backward compat)
function onTouchDragStart(e,idx){
  e.stopPropagation(); e.preventDefault();
  touchDragIdx=idx; isLongPress=true;
  navigator.vibrate&&navigator.vibrate(30);
  const card=e.target.closest('.card');
  touchStartY=e.touches[0].clientY;
  touchClone=card.cloneNode(true);
  touchClone.style.cssText='position:fixed;left:8px;right:8px;z-index:999;opacity:.9;pointer-events:none;box-shadow:0 8px 32px rgba(61,50,41,.25);border:2px solid var(--pink);border-radius:14px;transition:none;transform:scale(1.02)';
  touchClone.style.top=card.getBoundingClientRect().top+'px';
  document.body.appendChild(touchClone);
  card.classList.add('dragging');
  document.addEventListener('touchmove',onTouchDragMove,{passive:false});
  document.addEventListener('touchend',onTouchDragEnd);
}

// === DISTANCE CALC ===
function autoCalcDistance(){
  const itin=getActiveItinerary();
  const date=TRIP_DATES[currentDay];
  const items=itin[date]||[];
  if(editingIdx<=0&&editingIdx!==-1){alert('第一個項目無法計算與前一站的距離');return}
  const prevIdx=editingIdx===-1?items.length-1:editingIdx-1;
  if(prevIdx<0||!items[prevIdx]||!items[prevIdx].coords){alert('前一站沒有座標');return}
  const prevCoords=items[prevIdx].coords;
  const curCoords=editingCoords;
  if(!curCoords||curCoords[0]===0){alert('目前項目沒有座標，請先搜尋地點');return}
  fetch('/api/distance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({points:[prevCoords,curCoords]})})
    .then(r=>r.json()).then(data=>{
      if(data.distances&&data.distances[0]){
        const d=data.distances[0];
        document.getElementById('epDrive').value=`車程約${d.minutes}分 (${d.straight_km}km)`;
      }
    }).catch(()=>alert('距離計算失敗'));
}

      });

function addSearchResultToItinerary(){
  if(!mapSearchResult) return;
  const r=mapSearchResult;
  const itin=getActiveItinerary();
  const date=TRIP_DATES[currentDay];
  const items=itin[date]||[];
  // Compute smart default time from last item
  let defaultTime='09:00';
  if(items.length){
    const last=items[items.length-1];
    const m=last.time.match(/^(\d{1,2}):(\d{2})$/);
    if(m){
      let mins=parseInt(m[1])*60+parseInt(m[2]);
      const durMatch=(last.duration||'').match(/(\d+)/);
      mins+=durMatch?parseInt(durMatch[1]):60;
      const h=Math.floor(mins/60), mi=mins%60;
      defaultTime=`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}`;
    }
  }
  openEditPanel(-1);
  document.getElementById('epName').value=r.name;
  document.getElementById('epTime').value=defaultTime;
  if(r.phone) document.getElementById('epPhone').value=r.phone;
  editingCoords=[r.lat,r.lng];
  document.getElementById('epCoords').textContent=`${r.lat}, ${r.lng}`;
  // Auto calc drive from previous item
  if(items.length){
    const prev=items[items.length-1];
    if(prev.coords&&prev.coords[0]>30){
      fetch('/api/distance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({points:[prev.coords,[r.lat,r.lng]]})})
        .then(res=>res.json()).then(data=>{
          if(data.distances&&data.distances[0]){
            const d=data.distances[0];
            document.getElementById('epDrive').value=`車程約${d.minutes}分 (${d.straight_km}km)`;
          }
        }).catch(()=>{});
    }
  }
  if(gInfoWindow) gInfoWindow.close();
}

// === HELPERS ===
function gmapNavUrl(lat,lng){return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`}
function gmapSearchUrl(name,coords){const q=encodeURIComponent(name);if(coords&&coords[0]>30)return`https://www.google.com/maps/search/${q}/@${coords[0]},${coords[1]},17z`;return`https://www.google.com/maps/search/?api=1&query=${q}`}

// === LOAD GOOGLE MAPS API ===
function loadGoogleMapsApi(){
  return fetch('/api/config').then(r=>r.json()).then(cfg=>{
    return new Promise((resolve,reject)=>{
      if(window.google&&window.google.maps){resolve();return}
      const s=document.createElement('script');
      s.src=`https://maps.googleapis.com/maps/api/js?key=${cfg.googleMapsApiKey}&libraries=places,marker&loading=async&callback=__gmReady`;
      s.async=true;s.defer=true;
      window.__gmReady=()=>{delete window.__gmReady;resolve()};
      s.onerror=reject;
      document.head.appendChild(s);
    });
  });
}

// === INIT ===
function showFallbackBanner(){
  document.body.classList.add('fallback-mode');
}
async function init(){
  // 顯示載入中，避免 cold start 期間閃現錯誤的預設方案
  const cardsPanel=document.getElementById('cards-panel');
  if(cardsPanel) cardsPanel.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--text2)"><div style="font-size:28px;margin-bottom:12px">⏳</div><div style="font-size:14px">載入行程中...</div></div>';

  let dbFailed=false;
  try {
    const r=await fetch('/api/data/batch?keys=trip_plans');
    if(!r.ok) throw new Error('batch failed');
    const batch=await r.json();
    if(batch._error) throw new Error(batch._error);
    const plansRes=batch.trip_plans;
    if(plansRes && plansRes.plans){
      // DB has data — use it, migratePlanData handles format upgrade in-place
      _plansCache=plansRes;
    } else if(plansRes && typeof plansRes==='object' && !plansRes.plans){
      // DB has data but unexpected format — preserve it, do NOT overwrite
      console.warn('trip_plans has unexpected format, preserving as-is:', Object.keys(plansRes));
      _plansCache=defaultPlans();
    } else {
      // DB is truly empty (null) — only then seed with defaults
      _plansCache=defaultPlans();
      fetch('/api/data/trip_plans',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(_plansCache)}).catch(()=>{});
    }
  } catch(e){
    console.warn('DB load failed, using defaults:', e);
    dbFailed=true;
    _plansCache=defaultPlans();
  }
  if(dbFailed) showFallbackBanner();
  loadActivePlanState();
  const today=new Date().toISOString().slice(0,10);
  const idx=TRIP_DATES.indexOf(today);
  if(idx>=0) currentDay=idx;
  renderDayChips(); renderItinerary(); renderFoodPage(); renderReservations(); renderSpotLibrary(); setupTabs();
  loadGoogleMapsApi().then(()=>setTimeout(initMap,100)).catch(e=>console.warn('Google Maps load failed',e));
  updateCountdown(); setInterval(updateCountdown,60000);
}

// === DAY CHIPS ===
function renderDayChips(){
  const el=document.getElementById('dayChips');
  let html=`<button class="day-chip${currentDay===-1&&!multiDays?' active':''}" data-day="-1">ALL 總覽</button>`;
  html+=TRIP_DATES.map((d,i)=>{
    const dt=new Date(d+'T12:00:00+09:00');
    const wd=['日','一','二','三','四','五','六'][dt.getDay()];
    const isActive=!multiDays&&i===currentDay;
    const isMulti=multiDays&&multiDays.includes(i);
    return `<button class="day-chip${isActive?' active':''}${isMulti?' multi-selected':''}" data-day="${i}">${getDayShort(i)} ${dt.getMonth()+1}/${dt.getDate()}(${wd})</button>`;
  }).join('');
  // Multi-day toggle button
  html+=`<button class="day-chip multi-btn${multiDays?' multi-active':''}" data-day="multi" title="多天模式：可同時選多天並排比較">⊞ 多天</button>`;
  el.innerHTML=html;
  el.querySelectorAll('.day-chip').forEach(b=>{
    b.onclick=(e)=>{
      const day=b.dataset.day;
      if(day==='multi'){
        // Toggle multi-day mode
        if(multiDays){
          multiDays=null;
          renderDayChips(); renderItinerary(); renderMap();
        } else {
          multiDays=[currentDay>=0?currentDay:0];
          renderDayChips(); renderItinerary(); renderMap();
        }
        return;
      }
      const dayNum=+day;
      if(multiDays){
        // Multi-day: toggle this day in/out
        if(dayNum===-1){multiDays=null;currentDay=-1;renderDayChips();renderItinerary();renderMap();return;}
        const idx=multiDays.indexOf(dayNum);
        if(idx>=0){
          multiDays.splice(idx,1);
          if(multiDays.length===0) multiDays=null;
        } else {
          multiDays.push(dayNum);
          multiDays.sort((a,b)=>a-b);
        }
        renderDayChips(); renderItinerary(); renderMap();
      } else {
        // Single day mode
        currentDay=dayNum;
        multiDays=null;
        document.querySelectorAll('.day-chip').forEach(c=>{
          c.classList.remove('active','multi-selected');
          if(+c.dataset.day===currentDay) c.classList.add('active');
        });
        clearMapSearch();
        renderItinerary(); renderMap();
      }
    };
  });
}

// === MAP HELPERS ===
function createMarkerContent(label,color){
  const div=document.createElement('div');
  div.className='marker-label';
  div.style.background=color;
  div.textContent=label;
  return div;
}

// === MAP ===
function initMap(){
  if(googleMap) return;
  if(!window.google||!window.google.maps) return;
  googleMap=new google.maps.Map(document.getElementById('map-container'),{
    center:{lat:33.25,lng:130.1},zoom:9,
    mapId:'TRAVEL_MAP_MAIN',
    zoomControl:true,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
    streetViewControl:false,
    fullscreenControl:false
  });
  gInfoWindow=new google.maps.InfoWindow();

  // POI click
  googleMap.addListener('click',(e)=>{
    if(e.placeId){
      e.stop();
      handlePoiClick(e.placeId,e.latLng);
    }
  });

  renderMap();
}

const POI_TYPE_ZH={'restaurant':'餐廳','cafe':'咖啡廳','bar':'酒吧','lodging':'住宿','park':'公園','museum':'博物館','shrine':'神社','temple':'寺廟','store':'商店','shopping_mall':'商場','convenience_store':'便利店','train_station':'車站','bus_station':'公車站','airport':'機場','pharmacy':'藥局','hospital':'醫院','bakery':'麵包店','supermarket':'超市','tourist_attraction':'觀光景點','amusement_park':'遊樂園','aquarium':'水族館','zoo':'動物園','spa':'溫泉','book_store':'書店','clothing_store':'服飾店'};
function poiStars(n){return '★'.repeat(Math.round(n))+'☆'.repeat(5-Math.round(n));}
function poiPrice(l){return l?'·'+'$'.repeat(l):'';}

function handlePoiClick(placeId,latLng){
  fetch('/api/places/details?place_id='+placeId)
    .then(r=>r.json()).then(data=>{
      const r=data.result||{};
      const name=r.name||'未知地點';
      const eName=name.replace(/'/g,"\\'");
      let h='<div class="poi-card">';

      // Photos
      if(r.photos&&r.photos.length){
        h+='<div class="poi-photos">';
        r.photos.slice(0,3).forEach(p=>{
          h+=`<img src="/api/places/photo?ref=${encodeURIComponent(p.photo_reference)}&w=300" alt="photo" loading="lazy">`;
        });
        h+='</div>';
      }

      // Name + rating
      h+=`<div class="popup-title">${name}</div>`;
      if(r.rating){
        h+=`<div class="poi-meta"><span style="color:#fbbc04">${poiStars(r.rating)}</span> ${r.rating}`;
        if(r.user_ratings_total) h+=` (${r.user_ratings_total})`;
        h+=` ${poiPrice(r.price_level)}</div>`;
      }

      // Type tags
      if(r.types&&r.types.length){
        const tags=r.types.filter(t=>POI_TYPE_ZH[t]).slice(0,4);
        if(tags.length){
          h+='<div class="poi-tags">';
          tags.forEach(t=>{h+=`<span>${POI_TYPE_ZH[t]}</span>`;});
          h+='</div>';
        }
      }

      // Address
      if(r.formatted_address) h+=`<div class="poi-meta">${r.formatted_address}</div>`;

      // Opening hours
      if(r.opening_hours){
        const oh=r.opening_hours;
        const today=new Date().getDay();
        const todayText=oh.weekday_text&&oh.weekday_text[today===0?6:today-1];
        h+=`<div class="poi-meta">${oh.open_now?'<b style="color:#0d8043">営業中</b>':'<b style="color:#d93025">営業時間外</b>'}`;
        if(oh.weekday_text){
          h+=` <button class="poi-hours-toggle" onclick="this.nextElementSibling.classList.toggle('open')">時間を表示</button>`;
          h+=`<div class="poi-hours-full">${oh.weekday_text.join('\n')}</div>`;
        }
        h+='</div>';
      }

      // Phone + website
      if(r.formatted_phone_number) h+=`<div class="poi-meta">📞 ${r.formatted_phone_number}</div>`;
      if(r.website) h+=`<div class="poi-meta"><a href="${r.website}" target="_blank" style="color:#1a73e8">🌐 ウェブサイト</a></div>`;

      // Reviews
      if(r.reviews&&r.reviews.length){
        r.reviews.slice(0,2).forEach(rv=>{
          h+=`<div class="poi-review"><span class="author">${rv.author_name||''}</span> <span class="stars">${poiStars(rv.rating)}</span><div class="text">${rv.text||''}</div></div>`;
        });
      }

      // Actions
      h+=`<div class="poi-actions">`;
      h+=`<a class="popup-nav-btn" href="${gmapSearchUrl(name)}" target="_blank">📍 Google Maps</a>`;
      h+=` <button class="popup-add-btn" onclick="addPoiToItinerary('${eName}',${latLng.lat()},${latLng.lng()},'${(r.formatted_phone_number||'').replace(/'/g,"\\'")}')">+ 加入行程</button>`;
      h+='</div></div>';

      gInfoWindow.setContent(h);
      gInfoWindow.setPosition(latLng);
      gInfoWindow.open(googleMap);
    }).catch(()=>{});
}

function addPoiToItinerary(name,lat,lng,phone){
  const itin=getActiveItinerary();
  const date=TRIP_DATES[currentDay<0?0:currentDay];
  const items=itin[date]||[];
  let defaultTime='09:00';
  if(items.length){
    const last=items[items.length-1];
    const m=last.time.match(/^(\d{1,2}):(\d{2})$/);
    if(m){
      let mins=parseInt(m[1])*60+parseInt(m[2]);
      const durMatch=(last.duration||'').match(/(\d+)/);
      mins+=durMatch?parseInt(durMatch[1]):60;
      const h=Math.floor(mins/60),mi=mins%60;
      defaultTime=`${String(h).padStart(2,'0')}:${String(mi).padStart(2,'0')}`;
    }
  }
  if(currentDay<0) currentDay=0;
  openEditPanel(-1);
  document.getElementById('epName').value=name;
  document.getElementById('epTime').value=defaultTime;
  if(phone) document.getElementById('epPhone').value=phone;
  editingCoords=[lat,lng];
  document.getElementById('epCoords').textContent=`${lat}, ${lng}`;
  gInfoWindow.close();
}

function renderMap(){
  if(!googleMap) return;
  mapMarkers.forEach(m=>m.map=null);
  mapLines.forEach(l=>l.setMap(null));
  mapMarkers=[];mapLines=[];
  if(currentDay===-1){ renderOverallMap(); return; }
  const date=TRIP_DATES[currentDay], itin=getActiveItinerary(), allItems=itin[date]||[];
  const items=allItems.filter(i=>i.coords&&i.coords[0]>30);
  if(!items.length) return;
  const colors={spot:'#4caf50',restaurant:'#ff9800',hotel:'#e91e63',snack:'#ffc107',airport:'#607d8b',transport:'#2196f3'};
  const bounds=new google.maps.LatLngBounds();
  items.forEach((item,idx)=>{
    const origIdx=allItems.indexOf(item);
    const color=colors[item.type]||'#999';
    const marker=new google.maps.marker.AdvancedMarkerElement({
      map:googleMap,
      position:{lat:item.coords[0],lng:item.coords[1]},
      content:createMarkerContent(`${idx+1}. ${item.icon} ${item.name}`,color)
    });
    let ph=`<div class="popup-title">${item.icon} ${item.name}</div>`;
    ph+=`<div>${item.time}${item.duration?' ・ '+item.duration:''}</div>`;
    if(item.note) ph+=`<div style="margin-top:3px;font-size:11px;color:#666;white-space:pre-line">${item.note.split('\n').slice(0,2).join('\n')}</div>`;
    ph+=`<a class="popup-nav-btn" href="${gmapSearchUrl(item.gmap||item.name,item.coords)}" target="_blank">📍 Google Maps</a>`;
    if(item.phone) ph+=` <a class="popup-call-btn" href="tel:${item.phone}">📞 撥打</a>`;
    marker.addListener('gmp-click',()=>{
      gInfoWindow.setContent(ph);
      gInfoWindow.open(googleMap,marker);
      highlightCard(origIdx);
    });
    mapMarkers.push(marker);
    bounds.extend({lat:item.coords[0],lng:item.coords[1]});
  });
  if(items.length>1){
    const path=items.map(i=>({lat:i.coords[0],lng:i.coords[1]}));
    const line=new google.maps.Polyline({path,strokeColor:'#e91e63',strokeWeight:2.5,strokeOpacity:.4,map:googleMap});
    mapLines.push(line);
  }
  googleMap.fitBounds(bounds,30);
}

function renderOverallMap(){
  const dayColors=['#e91e63','#ff9800','#4caf50','#2196f3','#9c27b0','#607d8b'];
  const itin=getActiveItinerary();
  const allBounds=new google.maps.LatLngBounds();
  let hasBounds=false;
  TRIP_DATES.forEach((date,di)=>{
    const items=(itin[date]||[]).filter(i=>i.coords&&i.coords[0]>30);
    if(!items.length) return;
    const color=dayColors[di]||'#999';
    const routePath=[];
    items.forEach(item=>{
      const marker=new google.maps.marker.AdvancedMarkerElement({
        map:googleMap,
        position:{lat:item.coords[0],lng:item.coords[1]},
        content:createMarkerContent(`${getDayShort(di)} ${item.icon} ${item.name}`,color)
      });
      let ph=`<div class="popup-title">${item.icon} ${item.name}</div>`;
      ph+=`<div>${getDayShort(di)} ${item.time}${item.duration?' ・ '+item.duration:''}</div>`;
      ph+=`<a class="popup-nav-btn" href="${gmapSearchUrl(item.gmap||item.name,item.coords)}" target="_blank">📍 Google Maps</a>`;
      marker.addListener('gmp-click',()=>{
        gInfoWindow.setContent(ph);
        gInfoWindow.open(googleMap,marker);
      });
      mapMarkers.push(marker);
      const pos={lat:item.coords[0],lng:item.coords[1]};
      routePath.push(pos);
      allBounds.extend(pos);
      hasBounds=true;
    });
    if(routePath.length>1){
      const line=new google.maps.Polyline({path:routePath,strokeColor:color,strokeWeight:3,strokeOpacity:.6,map:googleMap});
      mapLines.push(line);
    }
  });
  if(hasBounds) googleMap.fitBounds(allBounds,30);
}

function highlightCard(idx){
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('highlight'));
  const card=document.getElementById('card-'+idx);
  if(card){
    card.classList.add('highlight');
    card.scrollIntoView({behavior:'smooth',block:'center'});
    const d=document.getElementById('detail-'+idx);
    if(d&&!d.classList.contains('open')) d.classList.add('open');
    setTimeout(()=>card.classList.remove('highlight'),3000);
  }
}
function focusMap(lat,lng){
  if(!googleMap) return;
  googleMap.panTo({lat,lng});
  googleMap.setZoom(14);
  const itin=getActiveItinerary();
  const items=(itin[TRIP_DATES[currentDay]]||[]).filter(i=>i.coords&&i.coords[0]>30);
  const mi=items.findIndex(i=>i.coords[0]===lat&&i.coords[1]===lng);
  if(mi>=0&&mapMarkers[mi]){
    google.maps.event.trigger(mapMarkers[mi],'click');
  }
}

function updatePlanLabel(){
  const plan=getActivePlan();
  const l=document.getElementById('activePlanLabel');
  if(l) l.textContent='📋 '+plan.name;
  // 動態更新標題
  const titleEl=document.getElementById('appTitle');
  if(titleEl) titleEl.textContent=plan.name;
  document.title=plan.name;
  // 更新副標題：日期範圍
  const itin=plan.data&&plan.data.itinerary?plan.data.itinerary:{};
  const dates=Object.keys(itin).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
  let subtitle='';
  if(dates.length>=2){
    const d0=new Date(dates[0]),d1=new Date(dates[dates.length-1]);
    const wd=['日','一','二','三','四','五','六'];
    subtitle=`${d0.getMonth()+1}/${d0.getDate()}(${wd[d0.getDay()]}) ~ ${d1.getMonth()+1}/${d1.getDate()}(${wd[d1.getDay()]}) ・ ${dates.length}天${dates.length-1}夜`;
  }
  const subEl=document.getElementById('appSubtitle');
  if(subEl) subEl.textContent=subtitle;
  // 更新美食副標題
  const foodSub=document.getElementById('foodSubtitle');
  if(foodSub){
    const isKorea=(plan.id||'').includes('busan');
    foodSub.textContent=isKorea?'當地特色美食 韓文+中文 給店員看':'當地特色美食 日文+中文 給店員看';
  }
}

function getNowJST(){const n=new Date(),j=new Date(n.getTime()+(n.getTimezoneOffset()+540)*60000);return{dateStr:j.toISOString().slice(0,10),timeMin:j.getHours()*60+j.getMinutes()}}
function parseTime(t){const[h,m]=t.split(':').map(Number);return h*60+m}

function isCurrentItem(items,idx,nowMin){const s=parseTime(items[idx].time),e=idx<items.length-1?parseTime(items[idx+1].time):s+120;return nowMin>=s&&nowMin<e}

function updateCountdown(){
  const bar=document.getElementById('countdownBar'),ind=document.getElementById('nowIndicator');
  if(!bar||!ind) return;
  const now=getNowJST(),date=TRIP_DATES[currentDay],itin=getActiveItinerary(),items=itin[date]||[];
  if(now.dateStr!==date){bar.style.display='none';ind.style.display='none';return}
  let ci=-1;for(let i=items.length-1;i>=0;i--)if(now.timeMin>=parseTime(items[i].time)){ci=i;break}
  if(ci>=0){ind.style.display='block';ind.innerHTML=`📍 目前：${items[ci].name}`}
  if(ci>=0&&ci<items.length-1){const nx=items[ci+1],diff=parseTime(nx.time)-now.timeMin;if(diff>0&&diff<=180){bar.style.display='flex';bar.innerHTML=`⏳ 下一站 <b>${nx.name}</b>　${diff}分鐘後 (${nx.time})`}else bar.style.display='none'}else bar.style.display='none';
}

function addSpotToItinerary(spotId,dayIdx){
  const spots=getSpots();
  const spot=spots.find(s=>s.id===spotId);
  if(!spot) return;
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===plans.activeId);
  if(!p) return;
  const dates=Object.keys(p.data.itinerary).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
  const date=dates[dayIdx];
  if(!date) return;
  // Remove from any other day first
  dates.forEach(d=>{
    p.data.itinerary[d]=p.data.itinerary[d].filter(item=>item.spotId!==spotId);
  });
  // Build itinerary item from spot
  const typeIcons={spot:'🏯',restaurant:'🍽',snack:'🍡',hotel:'🏨',transport:'🚗'};
  const newItem={
    time:'09:00',name:spot.name,type:spot.type||'spot',
    icon:typeIcons[spot.type]||'📍',
    duration:spot.duration||'',note:spot.note||'',
    phone:spot.phone||'',coords:spot.coords||null,
    spotId:spotId  // keep reference back to library
  };
  p.data.itinerary[date].push(newItem);
  savePlansData(plans);
  renderItinerary(); renderMap(); renderSpotLibrary();
}

function removeSpotFromItinerary(spotId){
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===plans.activeId);
  if(!p) return;
  const dates=Object.keys(p.data.itinerary).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
  let removed=false;
  dates.forEach(d=>{
    const before=p.data.itinerary[d].length;
    p.data.itinerary[d]=p.data.itinerary[d].filter(item=>item.spotId!==spotId);
    if(p.data.itinerary[d].length<before) removed=true;
  });
  if(removed){savePlansData(plans);renderItinerary();renderMap();}
  renderSpotLibrary();
}

function deleteSpot(spotId){
  if(!confirm('確定從景點庫刪除這個景點？（也會從行程中移除）')) return;
  removeSpotFromItinerary(spotId);
  const spots=getSpots().filter(s=>s.id!==spotId);

function moveItemToDay(fromDayIdx,itemIdx,toDayIdx){
  if(fromDayIdx===toDayIdx) return;
  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===plans.activeId);
  if(!p) return;
  const dates=Object.keys(p.data.itinerary).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
  const fromDate=dates[fromDayIdx];
  const toDate=dates[toDayIdx];
  if(!fromDate||!toDate) return;
  const items=p.data.itinerary[fromDate];
  if(!items||itemIdx<0||itemIdx>=items.length) return;
  // Splice item from source day
  const [item]=items.splice(itemIdx,1);
  // Push to target day
  if(!p.data.itinerary[toDate]) p.data.itinerary[toDate]=[];
  p.data.itinerary[toDate].push(item);
  savePlansData(plans);
  renderItinerary(); renderMap();
}

// === SEND TO SPOT LIBRARY ===
function sendToSpotLibrary(itemIdx){
  const itin=getActiveItinerary();
  const date=TRIP_DATES[currentDay];
  const items=itin[date]||[];
  if(itemIdx<0||itemIdx>=items.length) return;
  const item=items[itemIdx];
  if(!confirm(`將「${item.name}」從行程移回景點庫？`)) return;

  const plans=loadPlans();
  const p=plans.plans.find(p=>p.id===plans.activeId);
  if(!p) return;

  // If item has spotId, spot already in library — just remove from itinerary
  // If no spotId, create a new spot from item data
  if(!item.spotId){
    const spot={
      id:genSpotId(),
      name:item.name,
      type:item.type||'spot',
      duration:item.duration||'',
      note:item.note||'',
      phone:item.phone||'',
      where:item.drive||'',
      coords:item.coords||null,
      createdAt:new Date().toISOString()
    };
    if(!p.data.spots) p.data.spots=[];
    p.data.spots.push(spot);
    // Mark item with spotId before removing (in case we want to reference later)
    item.spotId=spot.id;
  }

  // Remove item from itinerary
  const dates=Object.keys(p.data.itinerary).filter(k=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort();
  dates.forEach(d=>{
    p.data.itinerary[d]=p.data.itinerary[d].filter((_,i)=>!(d===date&&i===itemIdx));
  });

  savePlansData(plans);
  renderItinerary(); renderMap(); renderSpotLibrary();
}

function initFoodMap(){
  if(foodMap) return;
  if(!window.google||!window.google.maps) return;
  const plan=getActivePlan();
  const isKorea=plan&&(plan.id||'').includes('busan');
  const mapCenter=isKorea?{lat:35.13,lng:129.1}:{lat:33.25,lng:130.1};
  foodMap=new google.maps.Map(document.getElementById('food-map-container'),{
    center:mapCenter,zoom:11,
    mapId:'TRAVEL_MAP_FOOD',
    zoomControl:true,
    zoomControlOptions:{position:google.maps.ControlPosition.RIGHT_BOTTOM},
    streetViewControl:false,
    fullscreenControl:false
  });
  foodInfoWindow=new google.maps.InfoWindow();
  const colors={Day1:'#e91e63',Day2:'#ff9800',Day3:'#4caf50',Day4:'#2196f3',Day5:'#9c27b0','推薦':'#795548','強烈推薦':'#C67B5C','行程內':'#6B7B3C'};
  const bounds=new google.maps.LatLngBounds();
  let hasBounds=false;
  foods.forEach((f,i)=>{
    if(!f.coords) return;
    const color=colors[f.tag]||colors[f.day]||'#999';
    const marker=new google.maps.marker.AdvancedMarkerElement({
      map:foodMap,
      position:{lat:f.coords[0],lng:f.coords[1]},
      content:createMarkerContent(`${i+1}. 🍽 ${f.name}`,color)
    });
    const langKey=isKorea?'kr':'jp';
    const localName=f[langKey]||'';
    let ph=`<div class="popup-title">🍽 ${f.name}</div>`;
    ph+=`<div>${f.day} ・ ${f.where}</div>`;
    if(localName) ph+=`<div style="margin-top:3px;font-size:11px;color:#666">${localName}</div>`;
    if(f.price) ph+=`<div style="font-size:11px;margin-top:2px">💰 ${f.price}</div>`;
    ph+=`<a class="popup-nav-btn" href="${gmapSearchUrl(f.gmap||f.name,f.coords)}" target="_blank">📍 Google Maps</a>`;
    marker.addListener('gmp-click',()=>{
      foodInfoWindow.setContent(ph);
      foodInfoWindow.open(foodMap,marker);
      highlightFoodCard(i);
    });
    foodMarkers.push(marker);
    bounds.extend({lat:f.coords[0],lng:f.coords[1]});
    hasBounds=true;
  });
  if(hasBounds) foodMap.fitBounds(bounds,30);
}

function onFoodCardClick(idx){
  const f=foods[idx];
  if(!f||!f.coords||!foodMap) return;
  foodMap.panTo({lat:f.coords[0],lng:f.coords[1]});
  foodMap.setZoom(14);
  if(foodMarkers[idx]) google.maps.event.trigger(foodMarkers[idx],'click');
}

function highlightFoodCard(idx){
  document.querySelectorAll('#food-cards-panel .food-card').forEach(c=>c.classList.remove('highlight'));
  const card=document.getElementById('food-card-'+idx);
  if(card){
    card.classList.add('highlight');
    card.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(()=>card.classList.remove('highlight'),3000);
  }
}

// === RESERVATIONS ===
function _buildResGroups(){
  if(!resOrder.length) resOrder=reservations.map((_,i)=>i);
  const groups=[];
  resOrder.forEach(i=>{
    const r=reservations[i], k=r.date+'|'+r.time;
    const g=groups.find(g=>g.key===k);
    if(g) g.items.push({r,i}); else groups.push({key:k,items:[{r,i}]});
  });
  return groups;
}
function renderReservations(){
  const s=document.getElementById('resScroll');
  if(!reservations.length){s.innerHTML='<div style="text-align:center;color:#999;padding:40px 0">此方案尚未設定預約資料</div>';return}
  let h='<div class="section-title">預約人：Wu Tsung Hsuan ・ +886-981053092</div>';
  const altLabels=['A','B','C','D','E'];
  _buildResGroups().forEach(g=>{
    const isGroup=g.items.length>1;
    if(isGroup){
      const {r}=g.items[0];
      h+=`<div class="res-group"><div class="res-group-header">📅 ${r.date} ${r.time} &nbsp;·&nbsp; 備選方案（拖曳可調整順序）</div>`;
    }
    g.items.forEach(({r,i},gi)=>{
      const cf=resStatusMap[i];
      const isRejected=cf==='x', isConfirmed=cf===true, isWalkin=cf==='w';
      const statusCls=isConfirmed?' confirmed':isRejected?' rejected':isWalkin?' walkin':'';
      const statusLabel=isConfirmed?'✅ 已確認':isRejected?'❌ 無法預約':isWalkin?'🚶 現場排':'⬜ 待確認';
      const badge=isGroup?`<span class="res-alt-badge">${altLabels[gi]}</span>`:'';
      const dragAttrs=isGroup?`draggable="true" ondragstart="resDragStart(event,${i})" ondragover="resDragOver(event)" ondrop="resDrop(event,${i})" ondragleave="resDragLeave(event)" ondragend="resDragEnd(event)"`:'';
      const handle=isGroup?`<span class="res-drag-handle">⠿</span>`:'';
      h+=`<div class="res-card${isRejected?' rejected':''}" ${dragAttrs}><div class="res-header"><div><div class="res-name">${handle}${badge}${r.zh||r.name}</div><div style="font-size:11px;color:var(--text2);margin-top:2px">${r.name}</div></div>`;
      if(!isGroup) h+=`<div class="res-date">${r.date} ${r.time}</div>`;
      h+=`</div><div class="res-info">🍽 ${r.cuisine}<br>💰 ${r.price}<br>👥 ${r.pax}<br>📝 ${r.note.replace(/\n/g,'<br>')}</div>`;
      h+=`<div class="res-actions"><a class="btn btn-call" href="tel:${r.phone}">📞 ${r.phone}</a>`;
      if(r.coords) h+=`<a class="btn btn-nav" href="${gmapSearchUrl(r.name,r.coords)}" target="_blank">📍 Google Maps</a>`;
      if(r.tabelog) h+=`<a class="btn btn-link" href="${r.tabelog}" target="_blank">⭐ Tabelog</a>`;
      h+=`<button class="res-status${statusCls}" onclick="toggleResStatus(${i})">${statusLabel}</button></div></div>`;
    });
    if(isGroup) h+=`</div>`;
  });
  s.innerHTML=h;
}
let _dragSrc=null;
function resDragStart(e,i){_dragSrc=i;setTimeout(()=>e.target.classList.add('dragging'),0);}
function resDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function resDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function resDragEnd(e){_dragSrc=null;document.querySelectorAll('.res-card').forEach(c=>c.classList.remove('dragging','drag-over'));}
function resDrop(e,targetI){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(_dragSrc===null||_dragSrc===targetI) return;
  const sr=reservations[_dragSrc], tr=reservations[targetI];
  if(sr.date+'|'+sr.time!==tr.date+'|'+tr.time) return;
  const sp=resOrder.indexOf(_dragSrc), tp=resOrder.indexOf(targetI);
  [resOrder[sp],resOrder[tp]]=[resOrder[tp],resOrder[sp]];
  saveActivePlanState(); savePlans();
  renderReservations();
}
function copyVisaFormat(){
  let num=0;
  const parts=[];
  _buildResGroups().forEach(g=>{
    const pending=g.items.filter(({i})=>resStatusMap[i]!=='x'&&resStatusMap[i]!==true&&resStatusMap[i]!=='w');
    if(!pending.length) return;
    if(g.items.length>1&&pending.length>1){const dateOnly=pending[0].r.date.replace(/\s*[\(（].*?[\)）]/,'').trim();parts.push(`【${dateOnly} ${pending[0].r.time.replace(' 午餐','').replace(' 晚餐','')} 有 ${pending.length} 間備選餐廳，請依序進行訂位！】`);}
    pending.forEach(({r})=>{
      const dateOnly=r.date.replace(/\s*[\(（].*?[\)）]/,'').trim();
      parts.push([`${++num}`,`  ${r.name}`,`  ${r.phone}`,`  預約日期: ${dateOnly}`,`  預約時間: ${r.time.replace(' 午餐','').replace(' 晚餐','')}`,`  預約人數: ${r.pax}`,`  座位: 禁菸`,`  預約大名: Wu Tsung Hsuan`,`  預約電話: +886-981053092`].join('\n'));
    });
  });
  const text=parts.join('\n\n');
  navigator.clipboard.writeText(text).then(()=>{
    showToastMsg('✅ 已複製 visa 格式到剪貼簿');
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToastMsg('✅ 已複製 visa 格式到剪貼簿');
  });
}
function toggleResStatus(i){
  const cur=resStatusMap[i];
  resStatusMap[i]=cur===undefined||cur===null||cur===false?true:cur===true?'x':cur==='x'?'w':undefined;
  saveActivePlanState(); savePlans();
  renderReservations();
  renderItinerary();
}

}

function exportItinerary(){
  const plan=getActivePlan();
  const json=JSON.stringify(plan.data,null,2);
  navigator.clipboard.writeText(json).then(()=>{
    showToastMsg('✅ 已複製「'+plan.name+'」行程 JSON 到剪貼簿');

function showToastMsg(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);

function openImportModal(){
  let overlay=document.getElementById('importModal');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='importModal';
    overlay.className='modal-overlay import-modal';
    overlay.innerHTML=`<div class="modal-panel"><div class="modal-header"><h2>📤 匯入行程 JSON</h2><button class="modal-close" onclick="closeImportModal()">✕</button></div><p style="font-size:13px;color:var(--text2);margin-bottom:10px">貼上行程 JSON，將覆蓋「<span id="importPlanName"></span>」的內容</p><textarea id="importTextarea" placeholder='貼上 JSON...'></textarea><div class="import-actions"><button class="btn-cancel" onclick="closeImportModal()">取消</button><button class="btn-import" onclick="doImport()">匯入並套用</button></div></div>`;
    overlay.addEventListener('click',e=>{if(e.target===overlay)closeImportModal()});
    document.body.appendChild(overlay);
  }
  document.getElementById('importPlanName').textContent=getActivePlan().name;
  document.getElementById('importTextarea').value='';
  overlay.classList.add('open');
}
function closeImportModal(){const o=document.getElementById('importModal');if(o)o.classList.remove('open')}
function doImport(){
  const raw=document.getElementById('importTextarea').value.trim();
  if(!raw){alert('請貼上 JSON');return}
  try{
    const data=JSON.parse(raw);
    if(typeof data!=='object'||Array.isArray(data)){throw new Error('格式錯誤')}
    // Validate: should have date keys with arrays
    const keys=Object.keys(data);
    if(!keys.length) throw new Error('空資料');
    const hasDateKey=keys.some(k=>/^\d{4}-\d{2}-\d{2}$/.test(k));
    if(!hasDateKey) throw new Error('找不到日期 key（格式：YYYY-MM-DD）');
    updateActiveItinerary(data);
    closeImportModal();
    renderItinerary(); renderMap();
    showToastMsg('✅ 行程已匯入並套用');
  }catch(e){
    alert('JSON 解析失敗：'+e.message);
  }
}

// === AI REVIEW ===
function aiReview(){
  let overlay=document.getElementById('aiReviewModal');
  if(!overlay){
    overlay=document.createElement('div');
    overlay.id='aiReviewModal';
    overlay.className='ai-modal-overlay';
    overlay.innerHTML=`<div class="ai-modal"><div class="ai-modal-head"><h2>🤖 AI 行程審查</h2><button class="modal-close" onclick="closeAiReview()">✕</button></div><div class="ai-modal-body" id="aiReviewBody"></div></div>`;
    overlay.addEventListener('click',e=>{if(e.target===overlay)closeAiReview()});
    document.body.appendChild(overlay);
  }
  overlay.classList.add('open');
  const body=document.getElementById('aiReviewBody');
  body.innerHTML=`<div style="padding:4px 0"><textarea id="aiReviewPrompt" rows="3" style="width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;resize:vertical;font-family:inherit" placeholder="請幫我全面審查行程並給建議（可自訂，例如：幫我把第三天行程改輕鬆一點）"></textarea><button onclick="doAiReview()" style="margin-top:8px;padding:10px 24px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:600">🚀 開始審查</button></div>`;
}
function doAiReview(){
  const body=document.getElementById('aiReviewBody');
  const userPrompt=(document.getElementById('aiReviewPrompt').value||'').trim();
  body.innerHTML='<div class="ai-spinner"><div class="spin"></div><div>AI 正在分析行程，請稍候...</div></div>';
  const plan=getActivePlan();
  const itineraryJson=plan.data;
  window._aiSuggestedData=null;
  fetch('/api/review',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_prompt:userPrompt,itinerary_json:itineraryJson})})
    .then(r=>r.json()).then(res=>{
      if(res.error){body.innerHTML=`<div style="color:#c62828;padding:20px">❌ ${res.error}</div>`;return}
      const raw=res.review;
      const marker='<!-- SUGGESTED_JSON -->';
      const idx=raw.indexOf(marker);
      let mdPart=raw, jsonPart=null;
      if(idx!==-1){
        mdPart=raw.substring(0,idx);
        const jsonStr=raw.substring(idx+marker.length).trim();
        try{jsonPart=JSON.parse(jsonStr);window._aiSuggestedData=jsonPart}catch(e){console.warn('AI JSON parse failed',e)}
      }
      let html=simpleMarkdown(mdPart);
      if(window._aiSuggestedData){
        html+=`<div style="text-align:center;margin:20px 0"><button onclick="applyAiSuggestion()" style="padding:12px 32px;background:#2e7d32;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;font-weight:600">✅ 套用 AI 建議</button></div>`;
      }
      body.innerHTML=html;
    }).catch(e=>{body.innerHTML=`<div style="color:#c62828;padding:20px">❌ 網路錯誤：${e.message}</div>`});
}
function applyAiSuggestion(){
  if(!window._aiSuggestedData)return;
  updateActiveItinerary(window._aiSuggestedData);
  renderItinerary();renderMap();
  showToastMsg('✅ 已套用 AI 建議');
  closeAiReview();
}
function closeAiReview(){const o=document.getElementById('aiReviewModal');if(o)o.classList.remove('open')}
function simpleMarkdown(md){
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g,'')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/^(?!<[hulo])/gm,function(m){return m?'<p>'+m:m})
    .replace(/<p><\/p>/g,'');
}
